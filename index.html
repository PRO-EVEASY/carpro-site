<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Pro Service | מומחה למולטימדיה לרכב</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body { background:#000; }

    .glow-text { text-shadow: none; }

    .premium-text {
      text-shadow: 0 2px 10px rgba(255,255,255,0.08);
    }

    .hero-bg {
      background-image: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.9)), url('mycar.jpg');
      background-size: cover;
      background-position: center;
    }

    .nav-link {
      position: relative;
    }

    .nav-link:after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      right: 0;
      background-color: #fff;
      transition: 0.3s;
    }

    .nav-link:hover:after {
      width: 100%;
      left: 0;
      right: auto;
    }

    .car-float:hover {
      transform: translateY(-10px) scale(1.02);
      transition: 0.4s;
    }
  </style>
</head>

<body class="text-white font-sans">

<section class="hero-bg h-screen flex items-center justify-center text-center">
  <div>
    <h1 class="text-6xl font-bold premium-text tracking-wider mb-4">
      Car Pro Service
    </h1>

    <p class="text-3xl text-zinc-300 mb-6">
      מומחה למערכות מולטימדיה לרכב
    </p>

    <p class="text-xl text-zinc-400 mb-10">
      בלי לפגוע באחריות • בלי פשרות • תוצאה מושלמת
    </p>

    <a href="tel:0506530471"
       class="bg-white text-black px-10 py-4 rounded-2xl text-xl font-semibold hover:bg-zinc-200 transition">
       📞 התקשר עכשיו
    </a>
  </div>
</section>

<section class="py-24 bg-black text-center">
  <h2 class="text-4xl font-bold mb-16 premium-text">השירותים שלנו</h2>

  <div class="grid md:grid-cols-3 gap-8 max-w-6xl mx-auto px-6">

    <div class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 car-float">
      <i class="fas fa-tv text-3xl mb-4"></i>
      <h3 class="text-xl font-semibold">Netflix לרכב</h3>
    </div>

    <div class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 car-float">
      <i class="fab fa-youtube text-3xl mb-4"></i>
      <h3 class="text-xl font-semibold">YouTube ללא פרסומות</h3>
    </div>

    <div class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 car-float">
      <i class="fas fa-map text-3xl mb-4"></i>
      <h3 class="text-xl font-semibold">Waze חכם</h3>
    </div>

  </div>
</section>

<section class="py-24 bg-zinc-900 text-center">
  <h2 class="text-4xl font-bold mb-10 premium-text">עבודה לדוגמה</h2>

  <img src="mycar.jpg" class="mx-auto rounded-2xl max-w-4xl w-full">
</section>

<section class="py-24 text-center bg-black">
  <h2 class="text-4xl font-bold mb-6 premium-text">דברו איתי</h2>

  <a href="tel:0506530471"
     class="bg-white text-black text-2xl px-12 py-6 rounded-3xl font-bold hover:bg-zinc-200 transition">
     050-6530471
  </a>
</section>

</body>
</html>
